image: node:24

pipelines:
  branches:
    main:
      - step:
          name: Build Assets & Deploy to o2switch
          caches:
            - node
          script:
            # 1️⃣ Installation des dépendances (On commence par ça pour ne pas gaspiller le temps de Whitelist)
            - apt-get update && apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcb-dri3-0 libxss1 libasound2 libxtst6 libxshmfence1 libgbm1 jq netcat-openbsd
            
            # 2️⃣ Build des assets
            - cd $THEME_DIR
            - npm install
            - npm run build
            - cd $BITBUCKET_CLONE_DIR

            # 3️⃣ WHITELIST & DIAGNOSTICS
            - export IPV4_A=$(curl -s https://api.ipify.org || echo "failed")
            - export IPV4_B=$(curl -s https://ifconfig.me || echo "failed")
            - export IPV4_C=$(curl -s https://checkip.amazonaws.com || echo "failed")
            - echo "IPs détectées - A:$IPV4_A | B:$IPV4_B | C:$IPV4_C"
            
            - |
              for IP in $(echo "$IPV4_A $IPV4_B $IPV4_C" | tr ' ' '\n' | grep -v "failed" | sort -u); do
                echo "Ouverture pare-feu pour IP $IP"
                WHITELIST_RES=$(curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" \
                "https://$CPANEL_SERVER:2083/execute/SshWhitelist/add?address=$IP&port=$SFTP_PORT&direction=in")
                echo "Réponse Whitelist pour $IP : $WHITELIST_RES"
              done
            
            - sleep 30
            
            # Test direct de connectivité
            - echo "Vérification de l'accès au port $SFTP_PORT sur $SFTP_HOST..."
            - nc -zv -w 10 $SFTP_HOST $SFTP_PORT || echo "ATTENTION : Le port $SFTP_PORT semble toujours fermé après whitelist."

            # 4️⃣ Transfert du dossier Build
            - LOCAL_BUILD_PATH="$THEME_DIR/public/build"
            - REMOTE_THEME_PATH="$SFTP_TARGET_DIR/$THEME_DIR"
            - REMOTE_THEME_PATH=$(echo $REMOTE_THEME_PATH | sed 's#//#/#g')
            
            - echo "Tentative de transfert vers $REMOTE_THEME_PATH/public/"
            - scp -4 -P $SFTP_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=120 -r $LOCAL_BUILD_PATH $SFTP_USER@$SFTP_HOST:$REMOTE_THEME_PATH/public/

            # 5️⃣ Commandes SSH finales
            - |
              ssh -4 -p $SFTP_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=120 $SFTP_USER@$SFTP_HOST "
                set -e
                cd $SFTP_TARGET_DIR
                git fetch origin
                git reset --hard origin/main
                composer install --no-dev --optimize-autoloader
                if command -v wp > /dev/null 2>&1; then
                  wp acorn optimize:clear
                fi
              "
          after-script:
            # 7️⃣ Nettoyage : On referme le pare-feu
            - export IPV4=$(curl -s https://api.ipify.org)
            - |
              curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" \
              "https://$CPANEL_SERVER:2083/execute/SshWhitelist/remove?address=$IPV4&port=$SFTP_PORT&direction=in"