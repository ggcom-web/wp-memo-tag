image: node:24

pipelines:
  branches:
    main:
      - step:
          name: Build Assets & Deploy to o2switch
          caches:
            - node
          script:
            # 1️⃣ Récupération de l'IP du Runner Bitbucket
            - export IPV4=$(curl -s https://api.ipify.org)
            - echo "IP du runner Bitbucket -> $IPV4"

            # 2️⃣ Ouverture du pare-feu o2switch (Whitelist)
            - |
              curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" \
              "https://$CPANEL_SERVER:2083/execute/SshWhitelist/add?address=$IPV4&port=$SFTP_PORT&direction=in"

            # 3️⃣ Installation des dépendances pour Puppeteer (Critical CSS)
            - apt-get update && apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcb-dri3-0 libxss1 libasound2 libxtst6 libxshmfence1 libgbm1 jq

            # 4️⃣ Build des assets (Node.js)
            - cd $THEME_DIR
            - npm install
            - npm run build
            - cd $BITBUCKET_CLONE_DIR # Retour à la racine 

            # 5️⃣ Transfert du dossier Build via SCP
            # Note : On utilise -O pour forcer le protocole SCP classique si nécessaire
            - LOCAL_BUILD_PATH="$THEME_DIR/public/build"
            - REMOTE_THEME_PATH="$SFTP_TARGET_DIR/$THEME_DIR"
            - REMOTE_THEME_PATH=$(echo $REMOTE_THEME_PATH | sed 's#//#/#g') # Nettoyage des slashs
            
            - echo "Transfert vers $REMOTE_THEME_PATH/public/"
            - scp -P $SFTP_PORT -r $LOCAL_BUILD_PATH $SFTP_USER@$SFTP_HOST:$REMOTE_THEME_PATH/public/

            # 6️⃣ Commandes SSH finales sur le serveur
            - ssh -p $SFTP_PORT $SFTP_USER@$SFTP_HOST "
                set -e
                cd $SFTP_TARGET_DIR
                git fetch origin
                git reset --hard origin/main
                composer install --no-dev --optimize-autoloader
                if command -v wp &> /dev/null; then
                  wp acorn optimize:clear
                fi
              "
          after-script:
            # 7️⃣ Nettoyage : On referme le pare-feu quoi qu'il arrive
            - export IPV4=$(curl -s https://api.ipify.org)
            - |
              curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" \
              "https://$CPANEL_SERVER:2083/execute/SshWhitelist/remove?address=$IPV4&port=$SFTP_PORT&direction=in"