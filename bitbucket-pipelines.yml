image: node:24

pipelines:
  branches:
    main:
      - step:
          name: Build Assets & Deploy to o2switch
          caches:
            - node
          script:
            # 1️⃣ Installation des dépendances
            - apt-get update && apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcb-dri3-0 libxss1 libasound2 libxtst6 libxshmfence1 libgbm1 jq netcat-openbsd
            - cd $THEME_DIR
            - npm install
            - npm run build
            - cd $BITBUCKET_CLONE_DIR
            # 2️⃣ WHITELISTING
            - export IPV4_A=$(curl -s https://api.ipify.org || echo "failed")
            - export IPV4_B=$(curl -s https://ifconfig.me || echo "failed")
            - export IPV4_C=$(curl -s https://checkip.amazonaws.com || echo "failed")
            - echo "IPs détectées - A:$IPV4_A | B:$IPV4_B | C:$IPV4_C"
            - |
              for IP in $(echo "$IPV4_A $IPV4_B $IPV4_C" | tr ' ' '\n' | grep -v "failed" | sort -u); do
                echo "Ouverture pare-feu pour IP $IP"
                curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" "https://$CPANEL_SERVER:2083/execute/SshWhitelist/add?address=$IP&port=$SFTP_PORT&direction=in"
                curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" "https://$CPANEL_SERVER:2083/execute/IPWhitelist/add?ip=$IP"
              done
            # 3️⃣ TRANSFERT
            - LOCAL_BUILD_PATH="$THEME_DIR/public/build"
            - REMOTE_THEME_PATH="$SFTP_TARGET_DIR/$THEME_DIR"
            - REMOTE_THEME_PATH=$(echo $REMOTE_THEME_PATH | sed 's#//#/#g')
            - echo "Tentative de transfert vers $REMOTE_THEME_PATH/public/"
            - scp -4 -P $SFTP_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=120 -r $LOCAL_BUILD_PATH $SFTP_USER@$SFTP_HOST:$REMOTE_THEME_PATH/public/
            # 4️⃣ COMMANDES FINALES
            - |
              ssh -4 -p $SFTP_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=120 $SFTP_USER@$SFTP_HOST "
                set -e
                cd $SFTP_TARGET_DIR
                git fetch origin
                git reset --hard origin/main

                # 1. Préparation : Sauvegarde rapide de la DB
                wp db export backup-before-update.sql

                # 2. Mise à jour des fichiers et activation
                composer install --no-dev
                wp language plugin install --all fr_FR
                wp plugin activate --all
                if command -v wp > /dev/null 2>&1; then
                  wp acorn optimize:clear
                fi
                # 3. LE TEST
                # On récupère le code HTTP de la page d'accueil
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://memo-tag.com/)

                if [ "$HTTP_CODE" -ne 200 ]; then
                  echo "ERREUR : Le site répond avec un code $HTTP_CODE. Lancement du Rollback..."
                  
                  # 4. ROLLBACK
                  # Restauration de la DB
                  wp db import backup-before-update.sql
                  
                  # Optionnel : Revenir à la version précédente de Composer
                  # git checkout composer.lock
                  # composer install
                  
                  echo "Rollback terminé. Le site est revenu à son état précédent."
                  exit 1 # Fait échouer le pipeline Bitbucket pour t'alerter
                else
                  echo "Succès : Le site est en ligne (Code 200)."
                  rm backup-before-update.sql
                fi

              "
          after-script:
            # 5️⃣ NETTOYAGE
            - export IPV4_A=$(curl -s https://api.ipify.org || echo "failed")
            - export IPV4_B=$(curl -s https://ifconfig.me || echo "failed")
            - export IPV4_C=$(curl -s https://checkip.amazonaws.com || echo "failed")
            - |
              for IP in $(echo "$IPV4_A $IPV4_B $IPV4_C" | tr ' ' '\n' | grep -v "failed" | sort -u); do
                echo "Fermeture pare-feu pour IP $IP"
                # Suppression ENTRANTE
                curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" "https://$CPANEL_SERVER:2083/execute/SshWhitelist/remove?address=$IP&port=$SFTP_PORT&direction=in"
                # Suppression SORTANTE
                curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" "https://$CPANEL_SERVER:2083/execute/SshWhitelist/remove?address=$IP&port=$SFTP_PORT&direction=out"
                # Suppression Globale (IPWhitelist)
                curl -sm 45 -H "Authorization: cpanel $CPANEL_LOGIN:$CPANEL_TOKEN" "https://$CPANEL_SERVER:2083/execute/IPWhitelist/remove?ip=$IP"
              done